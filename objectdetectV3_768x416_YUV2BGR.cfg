##处理顺序要求：通道交换（rbuv_swap_switch）>图像裁剪（crop ）> 色域转换（通道交换） > 数据减均值/归一化 > 图像边缘填充（padding）
aipp_op { 
    aipp_mode: static
    related_input_rank : 0
    
    src_image_size_w : 224
    src_image_size_h : 416
    crop : false
    padding : false

    input_format : YUV420SP_U8
    
    ##输入数据为BT-601NARROW视频 YVU420SP_U8转RGB  CANN-5.0.4
    # csc_switch : true
    # rbuv_swap_switch : true

    # matrix_r0c0 : 298
    # matrix_r0c1 : 0
    # matrix_r0c2 : 409
    # matrix_r1c0 : 298
    # matrix_r1c1 : -100
    # matrix_r1c2 : -208
    # matrix_r2c0 : 298
    # matrix_r2c1 : 516
    # matrix_r2c2 : 0
    # input_bias_0 : 16
    # input_bias_1 : 128
    # input_bias_2 : 128
    
    # # ##输入数据为BT-601NARROW视频  YVU420SP_U8转BGR CANN-6.3
    csc_switch : true
    rbuv_swap_switch : true

    matrix_r0c0 : 298
    matrix_r0c1 : 516
    matrix_r0c2 : 0
    matrix_r1c0 : 298
    matrix_r1c1 : -100
    matrix_r1c2 : -208
    matrix_r2c0 : 298
    matrix_r2c1 : 0
    matrix_r2c2 : 409
    input_bias_0 : 16
    input_bias_1 : 128
    input_bias_2 : 128

    # ##输入数据为BT-601NARROW视频  YVU420SP_U8转RGB CANN-6.3  效果更差
    # csc_switch : true
    # rbuv_swap_switch : true
    # matrix_r0c0 : 298
    # matrix_r0c1 : 0
    # matrix_r0c2 : 409
    # matrix_r1c0 : 298
    # matrix_r1c1 : -100
    # matrix_r1c2 : -208
    # matrix_r2c0 : 298
    # matrix_r2c1 : 516
    # matrix_r2c2 : 0
    # input_bias_0 : 16
    # input_bias_1 : 128
    # input_bias_2 : 128

    ## pixel_out_chx(i)=[pixel_in_chx(i)-mean_chn_i-min_chn_i]*var_reci_chn
    ##mean=[0, 0, 0]  #类型：uint8  255*mean
    mean_chn_0 : 0
    mean_chn_1 : 0
    mean_chn_2 : 0

    min_chn_0 : 0.0
    min_chn_1 : 0.0
    min_chn_2 : 0.0

    ##std=[1, 1, 1]  #类型：float 1/(255*std)
    var_reci_chn_0 : 0.003921569
    var_reci_chn_1 : 0.003921569
    var_reci_chn_2 : 0.003921569
}
